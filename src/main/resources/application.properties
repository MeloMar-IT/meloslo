spring.application.name=MeloSlo
spring.datasource.url=jdbc:h2:mem:openslodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.com.example.meloslo=DEBUG

# Application Mode: 'test' for simulated data, 'live' for real connections
app.datasource.mode=test

# Encryption Key for sensitive fields (must be 16, 24, or 32 chars)
app.encryption.key=ThisIsASecretK16
